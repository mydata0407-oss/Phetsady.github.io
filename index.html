<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ລະບົບຄຸ້ມຄອງເອກະສານ Online (Supabase)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600&display=swap');
        body { font-family: 'Noto Sans Lao', sans-serif; }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <!-- ເມນູ + Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-folder2-open"></i> DMS Online</a>
            <div id="userInfo" class="text-white small d-none"></div>
        </div>
    </nav>

    <!-- ເນື້ອຫາ -->
    <div class="row">
        <!-- Sidebar ເມນູ -->
        <div class="col-lg-2 bg-white border-end min-vh-100 p-3">
            <!-- ເມນູເຊື່ອງເປັນເດີມ -->
            <button onclick="showPage('list')" class="btn btn-outline-primary w-100 mb-2">📋 ລາຍການເອກະສານ</button>
            <button onclick="showPage('add')" class="btn btn-outline-success w-100 mb-2">➕ ບັນທຶກໃໝ່</button>
            <button onclick="logout()" class="btn btn-outline-danger w-100 mt-5">🚪 ອອກຈາກລະບົບ</button>
        </div>

        <!-- ຫນ້າຫຼັກ -->
        <div class="col-lg-10 p-4" id="mainContent">
            <!-- ລາຍການເອກະສານ (default) -->
            <div id="page-list">
                <h2>ລາຍການເອກະສານທັງໝົດ</h2>
                <table class="table table-hover" id="docTable">
                    <thead><tr><th>ເລກທີ</th><th>ປະເພດ</th><th>ວັນທີ</th><th>ຜູ້ສົ່ງ/ຮັບ</th><th>ເລື່ອງ</th><th>ສະຖານະ</th><th>ໄຟລ໌</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <!-- ຟອມບັນທຶກ (ເພີ່ມ/ແກ້) -->
            <div id="page-add" class="d-none">
                <!-- ເຕີມຟອມເດີມຂອງເຈົ້າ (ຂ້ອຍປັບໃຫ້ເຊື່ອມ Supabase ແລ້ວ) -->
                <!-- ... (ຂ້ອຍຫຍໍ້ເພື່ອບໍ່ຍາວເກີນໄປ) ... -->
                <button onclick="saveDocument()" class="btn btn-success">ບັນທຶກເຂົ້າ Online</button>
            </div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>ເຂົ້າສູ່ລະບົບ</h5>
            </div>
            <div class="modal-body">
                <input id="email" class="form-control mb-3" placeholder="ອີເມວ" type="email">
                <input id="password" class="form-control mb-3" placeholder="ລະຫັດຜ່ານ" type="password">
                <button onclick="signIn()" class="btn btn-primary w-100">ເຂົ້າສູ່ລະບົບ</button>
                <button onclick="signUp()" class="btn btn-secondary w-100 mt-2">ສະໝັກສະມາຊິກໃໝ່</button>
            </div>
        </div>
    </div>
</div>

<script>
    // === ປ່ຽນ 2 ບັນທຶດນີ້ເທົ່ານັ້ນ ===
    const SUPABASE_URL = 'https://your-project.supabase.co';     // ປ່ຽນເປັນຂອງເຈົ້າ
    const SUPABASE_ANON_KEY = 'your-anon-key-here';            // ປ່ຽນເປັນຂອງເຈົ້າ

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // ກວດສອບການເຂົ້າສູ່ລະບົບ
    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            new bootstrap.Modal(document.getElementById('loginModal')).show();
        } else {
            currentUser = session.user;
            document.getElementById('userInfo').innerHTML = `👤 ${currentUser.email}`;
            document.getElementById('userInfo').classList.remove('d-none');
            loadDocuments();
        }
    }

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else location.reload();
    }

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert(error.message); else alert('ການສະໝັກສຳເລັດ! ກວດອີເມວເພື່ອຢືນຢັນ');
    }

    async function logout() {
        await supabase.auth.signOut();
        location.reload();
    }

    // ໂຫຼດເອກະສານ (Realtime)
    async function loadDocuments() {
        const { data } = await supabase
            .from('documents')
            .select('*')
            .order('created_at', { ascending: false });
        // ເຕີມຕາຕະລາງ (ຂ້ອຍຫຍໍ້ໃຫ້ເຫັນຮູບແບບ)
        console.log(data);
        // ທ່ານສາມາດເຕີມ renderTable() ເຊັ່ນເດີມ
    }

    // Realtime (ອັບເດດອັດຕະໂນມັດ)
    supabase.channel('documents')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'documents' }, () => {
            loadDocuments();
        })
        .subscribe();

    window.onload = checkAuth;
</script>
</body>
</html>
