<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ລະບົບຄຸ້ມຄອງເອກະສານ Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600&display=swap');
        body { font-family: 'Noto Sans Lao', sans-serif; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-folder2-open me-2"></i>DMS Online</a>
            <div id="userInfo" class="text-white small d-none ms-auto"></div>
        </div>
    </nav>

    <div class="row">
        <div class="col-lg-2 bg-white border-end min-vh-100 p-3">
            <button id="btn-list" class="btn btn-outline-primary w-100 mb-2">📋 ລາຍການເອກະສານ</button>
            <button id="btn-add" class="btn btn-outline-success w-100 mb-2">➕ ບັນທຶກໃໝ່</button>
            <button id="btn-logout" class="btn btn-outline-danger w-100 mt-5">🚪 ອອກຈາກລະບົບ</button>
        </div>

        <div class="col-lg-10 p-4">
            <div id="page-list">
                <h2>ລາຍການເອກະສານທັງໝົດ</h2>
                <p class="text-muted">ຍັງບໍ່ມີເອກະສານ (ກວດ console ຖ້າມີ error)</p>
            </div>

            <div id="page-add" class="d-none">
                <h2>ບັນທຶກເອກະສານໃໝ່</h2>
                <p class="text-muted">ຟອມບັນທຶກ (ກຳລັງພັດທະນາ)</p>
            </div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="loginModalLabel">ເຂົ້າສູ່ລະບົບ / ສະໝັກ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input id="email" class="form-control mb-3" placeholder="ອີເມວ" type="email" required>
                <input id="password" class="form-control mb-3" placeholder="ລະຫັດຜ່ານ" type="password" required>
                <button id="btn-signin" class="btn btn-primary w-100 mb-2">ເຂົ້າສູ່ລະບົບ</button>
                <button id="btn-signup" class="btn btn-secondary w-100">ສະໝັກສະມາຊິກໃໝ່</button>
            </div>
        </div>
    </div>
</div>

<script>
    // =============================================
    // ຕັ້ງຄ່າ Supabase - ໃສ່ຄ່າຂອງເຈົ້າທີ່ນີ້
    // =============================================
    const SUPABASE_URL    = 'https://your-project-ref.supabase.co';          // ປ່ຽນເປັນຂອງເຈົ້າ
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.your-anon-key-here';  // ປ່ຽນເປັນ anon key

    // ໃຊ້ UMD version ເພື່ອຫຼຸດໂອກາດ error
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // =============================================
    // ຟັງຊັນ
    // =============================================
    async function checkAuth() {
        console.log("[Auth] ກຳລັງກວດ session...");
        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            console.log("[Auth] Session:", session);
            if (error) throw error;

            if (!session) {
                console.log("[Auth] ບໍ່ມີ session → ຂຶ້ນ modal");
                const modal = new bootstrap.Modal(document.getElementById('loginModal'));
                modal.show();
            } else {
                currentUser = session.user;
                document.getElementById('userInfo').innerHTML = `👤 ${currentUser.email}`;
                document.getElementById('userInfo').classList.remove('d-none');
                console.log("[Auth] ເຂົ້າສຳເລັດ:", currentUser.email);
            }
        } catch (err) {
            console.error("[Auth] Error:", err.message);
            alert("ການກວດສອບການເຂົ້າລະບົບຜິດພາດ: " + err.message);
        }
    }

    async function signIn() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return alert("ກະລຸນາໃສ່ອີເມວ ແລະ ລະຫັດຜ່ານ");

        try {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
            location.reload();
        } catch (err) {
            alert("ເຂົ້າສູ່ລະບົບບໍ່ສຳເລັດ:\n" + err.message);
        }
    }

    async function signUp() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return alert("ກະລຸນາໃສ່ອີເມວ ແລະ ລະຫັດຜ່ານ");

        try {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            alert("ສະໝັກສຳເລັດ! ກວດອີເມວເພື່ອຢືນຢັນ (ຖ້າເປີດ confirmation)");
            bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
        } catch (err) {
            alert("ສະໝັກບໍ່ສຳເລັດ:\n" + err.message);
        }
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    function showPage(page) {
        document.querySelectorAll('#page-list, #page-add').forEach(el => el.classList.add('d-none'));
        document.getElementById('page-' + page)?.classList.remove('d-none');
    }

    // =============================================
    // Event listeners
    // =============================================
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('btn-list')?.addEventListener('click', () => showPage('list'));
        document.getElementById('btn-add')?.addEventListener('click', () => showPage('add'));
        document.getElementById('btn-logout')?.addEventListener('click', logout);

        document.getElementById('btn-signin')?.addEventListener('click', signIn);
        document.getElementById('btn-signup')?.addEventListener('click', signUp);

        checkAuth();
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
