<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ລະບົບຄຸ້ມຄອງເອກະສານ Online (Supabase)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600&display=swap');
        body { font-family: 'Noto Sans Lao', sans-serif; }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-folder2-open"></i> DMS Online</a>
            <div id="userInfo" class="text-white small d-none ms-auto"></div>
        </div>
    </nav>

    <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-2 bg-white border-end min-vh-100 p-3">
            <button id="btn-list" class="btn btn-outline-primary w-100 mb-2">📋 ລາຍການເອກະສານ</button>
            <button id="btn-add" class="btn btn-outline-success w-100 mb-2">➕ ບັນທຶກໃໝ່</button>
            <button id="btn-logout" class="btn btn-outline-danger w-100 mt-5">🚪 ອອກຈາກລະບົບ</button>
        </div>

        <!-- Main Content -->
        <div class="col-lg-10 p-4" id="mainContent">
            <div id="page-list">
                <h2>ລາຍການເອກະສານທັງໝົດ</h2>
                <table class="table table-hover" id="docTable">
                    <thead><tr><th>ເລກທີ</th><th>ປະເພດ</th><th>ວັນທີ</th><th>ຜູ້ສົ່ງ/ຮັບ</th><th>ເລື່ອງ</th><th>ສະຖານະ</th><th>ໄຟລ໌</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div id="page-add" class="d-none">
                <h2>ບັນທຶກເອກະສານໃໝ່</h2>
                <p>ຟອມບັນທຶກ (ຍັງກຳລັງພັດທະນາ)</p>
                <!-- ເພີ່ມຟອມເຕັມໄດ້ຕໍ່ພາຍຫຼັງ -->
            </div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="loginModalLabel">ເຂົ້າສູ່ລະບົບ / ສະໝັກ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input id="email" class="form-control mb-3" placeholder="ອີເມວ" type="email">
                <input id="password" class="form-control mb-3" placeholder="ລະຫັດຜ່ານ" type="password">
                <button id="btn-signin" class="btn btn-primary w-100 mb-2">ເຂົ້າສູ່ລະບົບ</button>
                <button id="btn-signup" class="btn btn-secondary w-100">ສະໝັກສະມາຊິກໃໝ່</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================================
    // ຕັ້ງຄ່າ Supabase (ໃສ່ຄ່າຂອງເຈົ້າທີ່ນີ້)
    // ======================================
    const SUPABASE_URL = 'https://xxxxxxxxxxxx.supabase.co';       // ປ່ຽນເປັນ Project URL ຂອງເຈົ້າ
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';  // ປ່ຽນເປັນ anon public key

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // ======================================
    // ຟັງຊັນເຮັດວຽກ
    // ======================================
    async function checkAuth() {
        console.log("ກຳລັງກວດ session...");
        const { data: { session }, error } = await supabase.auth.getSession();
        console.log("Session:", session);
        console.log("Auth error:", error);

        if (error) {
            console.error("Auth error:", error.message);
        }

        if (!session) {
            console.log("ບໍ່ມີ session → ຂຶ້ນ modal");
            const modalElement = document.getElementById('loginModal');
            if (modalElement) {
                const modal = new bootstrap.Modal(modalElement);
                modal.show();
            } else {
                console.error("ບໍ່ພົບ element #loginModal");
            }
        } else {
            currentUser = session.user;
            document.getElementById('userInfo').innerHTML = `👤 ${currentUser.email}`;
            document.getElementById('userInfo').classList.remove('d-none');
            // loadDocuments();  // ເອີ້ນໂຫຼດຂໍ້ມູນເມື່ອເຂົ້າສຳເລັດ
        }
    }

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            alert("ເຂົ້າສູ່ລະບົບບໍ່ສຳເລັດ: " + error.message);
        } else {
            bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
            location.reload();
        }
    }

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
            alert("ສະໝັກບໍ່ສຳເລັດ: " + error.message);
        } else {
            alert("ສະໝັກສຳເລັດ! ກະລຸນາກວດອີເມວເພື່ອຢືນຢັນ (ຖ້າເປີດ confirmation)");
            bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
        }
    }

    async function logout() {
        await supabase.auth.signOut();
        location.reload();
    }

    // ຟັງຊັນໜ້າຕ່າງ (ງ່າຍໆ ສຳລັບທົດສອບ)
    function showPage(page) {
        document.querySelectorAll('#page-list, #page-add').forEach(el => el.classList.add('d-none'));
        document.getElementById('page-' + page).classList.remove('d-none');
        console.log("ປ່ຽນໜ້າເປັນ: " + page);
    }

    // ======================================
    // ເຊື່ອມ event ປຸ່ມ (ແນະນຳໃຊ້ແບບນີ້ ແທນ onclick inline)
    // ======================================
    document.addEventListener('DOMContentLoaded', () => {
        // ເຊື່ອມປຸ່ມ sidebar
        document.getElementById('btn-list')?.addEventListener('click', () => showPage('list'));
        document.getElementById('btn-add')?.addEventListener('click', () => showPage('add'));
        document.getElementById('btn-logout')?.addEventListener('click', logout);

        // ເຊື່ອມປຸ່ມໃນ modal
        document.getElementById('btn-signin')?.addEventListener('click', signIn);
        document.getElementById('btn-signup')?.addEventListener('click', signUp);

        // ກວດ auth ເມື່ອໂຫຼດໜ້າ
        checkAuth();
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
